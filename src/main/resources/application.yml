spring:
  datasource:
    url: ${SQL_DB_URL}
    username: ${SQL_DB_USERNAME}
    password: ${SQL_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 120
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 1000
    database-platform: org.hibernate.dialect.MySQL8Dialect
  # spring security 기본 로그인 id, pwd
  security:
#   소셜로그인
    oauth2:
      client:
        registration:
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            authorization-grant-type: authorization_code
            client-name: Naver
            scope:
              - name
              - email
              - profile_image

          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            scope:
              - account_email
              - profile_nickname
              - profile_image

          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - email
              - profile

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: email

          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
    # spring security 기본 로그인 id, pwd
    user:
      name: ${SECURITY_USERNAME}
      password: ${SECURITY_PASSWORD}
  #jwt 설정
jwt:
  secret: ${JWT_SECRETCODE}

app:
  oauth2:
    # OAuth2SuccessRedirectPage
    success-redirect: http://localhost:3000/home

ai:
  model:
    gpt: gpt-5.4
    claude: claude-haiku-4-5-20251001
  api:
    url:
      gpt: "https://api.openai.com/v1/chat/completions"
      claude: "https://api.anthropic.com/v1/messages"

# Resilience4j Circuit Breaker 설정
resilience4j:
  circuitbreaker:
    configs:
      default:
        # 슬라이딩 윈도우 타입 (COUNT_BASED: 요청 수 기반)
        slidingWindowType: COUNT_BASED
        # 슬라이딩 윈도우 크기 (최근 10개 요청 기준)
        slidingWindowSize: 10
        # Circuit OPEN 판단 기준 실패율 (50%)
        failureRateThreshold: 50
        # Circuit OPEN 상태 유지 시간 (10초 후 HALF_OPEN)
        waitDurationInOpenState: 10s
        # HALF_OPEN 상태에서 허용할 요청 수
        permittedNumberOfCallsInHalfOpenState: 3
        # 최소 요청 수 (이 수 이상이어야 실패율 계산)
        minimumNumberOfCalls: 5
        # 느린 호출 기준 시간 (15초 이상이면 느린 호출)
        slowCallDurationThreshold: 15s
        # 느린 호출 비율 기준 (50% 이상이면 OPEN)
        slowCallRateThreshold: 50
        # 자동으로 HALF_OPEN 전환 허용
        automaticTransitionFromOpenToHalfOpenEnabled: true
        # 5xx 에러만 실패로 카운트 (4xx 인증 에러는 제외)
        recordExceptions:
          - java.util.concurrent.TimeoutException
          - org.springframework.web.reactive.function.client.WebClientResponseException$InternalServerError
          - org.springframework.web.reactive.function.client.WebClientResponseException$BadGateway
          - org.springframework.web.reactive.function.client.WebClientResponseException$ServiceUnavailable
          - org.springframework.web.reactive.function.client.WebClientResponseException$GatewayTimeout
          - java.net.ConnectException
          - java.net.SocketTimeoutException
        ignoreExceptions:
          - org.springframework.web.reactive.function.client.WebClientResponseException$Unauthorized
          - org.springframework.web.reactive.function.client.WebClientResponseException$Forbidden
          - org.springframework.web.reactive.function.client.WebClientResponseException$TooManyRequests
    instances:
      gptCircuitBreaker:
        baseConfig: default
      claudeCircuitBreaker:
        baseConfig: default
      deepseekCircuitBreaker:
        baseConfig: default
      bardCircuitBreaker:
        baseConfig: default

  # Rate Limiter 설정 - AI API 한도 초과(429) 예방
  ratelimiter:
    configs:
      default:
        # 한도 초과 시 대기 최대 시간 (이 안에 처리 못 하면 에러)
        timeoutDuration: 10s
        # 통계 집계 주기
        limitRefreshPeriod: 1m
    instances:
      gptRateLimiter:
        baseConfig: default
        # GPT tier-1 기준: 분당 60 RPM
        limitForPeriod: 60
      claudeRateLimiter:
        baseConfig: default
        # Claude Haiku 기준: 분당 50 RPM
        limitForPeriod: 50
      deepseekRateLimiter:
        baseConfig: default
        # DeepSeek 기준: 분당 60 RPM
        limitForPeriod: 60
      bardRateLimiter:
        baseConfig: default
        # Gemini Flash 기준: 분당 60 RPM
        limitForPeriod: 60

  # 타임아웃 설정
  timelimiter:
    configs:
      default:
        timeoutDuration: 30s
        cancelRunningFuture: true
    instances:
      gptCircuitBreaker:
        baseConfig: default
      claudeCircuitBreaker:
        baseConfig: default
      deepseekCircuitBreaker:
        baseConfig: default
      bardCircuitBreaker:
        baseConfig: default

# metric test
management:
  endpoints:
    web:
      exposure:
        include: prometheus, metrics, health
  prometheus:
    metrics:
      export:
        enabled: true